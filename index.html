<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>COP Tático</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

  <!-- milsymbol.js — mesma biblioteca usada pelo plugin qgis_app6d -->
  <script src="https://cdn.jsdelivr.net/npm/milsymbol@2.2.0/dist/milsymbol.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #1a1f2e;
      color: #e8eaf0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Barra superior ─────────────────────────────────── */
    #topbar {
      background: #0d1b2a;
      border-bottom: 2px solid #2a4a6b;
      padding: 8px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      gap: 12px;
      z-index: 1001;
    }
    #topbar h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: #a8c8e8;
      text-transform: uppercase;
      white-space: nowrap;
    }
    #status-bar {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 12px;
      flex-wrap: wrap;
    }
    #last-update { color: #7a9ab8; display: flex; align-items: center; gap: 5px; }
    #update-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #4caf50; display: inline-block;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    #contadores { display: flex; gap: 6px; }
    .cnt {
      padding: 2px 10px; border-radius: 4px;
      font-size: 12px; font-weight: 500;
    }
    .cnt-f { background:#1a3a5c; color:#7ab8f5; border:1px solid #2a5a8c; }
    .cnt-i { background:#5c1a1a; color:#f57a7a; border:1px solid #8c2a2a; }
    .cnt-n { background:#1a3a1a; color:#7af57a; border:1px solid #2a6c2a; }
    .cnt-d { background:#3a3a1a; color:#f5e07a; border:1px solid #6c5a2a; }

    /* ── Mapa ────────────────────────────────────────────── */
    #map { flex: 1; width: 100%; }

    /* ── Painel de camadas ──────────────────────────────── */
    #layer-control {
      position: absolute;
      top: 58px; right: 10px;
      z-index: 1000;
      background: rgba(13,27,42,0.92);
      border: 1px solid #2a4a6b;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 12px;
      min-width: 160px;
    }
    #layer-control h3 {
      font-size: 11px; letter-spacing: 0.06em;
      text-transform: uppercase; color: #7a9ab8;
      margin-bottom: 8px;
    }
    .layer-row {
      display: flex; align-items: center;
      gap: 8px; margin-bottom: 6px; cursor: pointer;
    }
    .layer-dot {
      width: 10px; height: 10px;
      border-radius: 2px; display: inline-block;
    }

    /* ── Popup ──────────────────────────────────────────── */
    .popup-content { font-size: 13px; min-width: 200px; }
    .popup-title {
      font-size: 14px; font-weight: 600;
      margin-bottom: 6px; padding-bottom: 6px;
      border-bottom: 1px solid #ddd;
    }
    .popup-row { display: flex; gap: 6px; margin-bottom: 3px; }
    .popup-label { color: #666; min-width: 80px; font-size: 12px; }
    .popup-value { font-size: 12px; }
    .badge-host {
      display: inline-block; padding: 1px 8px;
      border-radius: 3px; font-size: 11px; font-weight: 500;
    }

    /* ── Rodapé ─────────────────────────────────────────── */
    #footer {
      background: #0d1b2a;
      border-top: 1px solid #2a4a6b;
      padding: 4px 16px;
      font-size: 11px; color: #4a6a8a;
      text-align: center; flex-shrink: 0;
    }
  </style>
</head>
<body>

<div id="topbar">
  <h1>🗺 COP Tático</h1>
  <div id="status-bar">
    <div id="contadores">
      <span class="cnt cnt-f" id="cnt-f">F: 0</span>
      <span class="cnt cnt-i" id="cnt-i">I: 0</span>
      <span class="cnt cnt-n" id="cnt-n">N: 0</span>
      <span class="cnt cnt-d" id="cnt-d">D: 0</span>
    </div>
    <span id="last-update">
      <span id="update-dot"></span>
      Aguardando dados...
    </span>
  </div>
</div>

<div id="map"></div>

<div id="layer-control">
  <h3>Camadas</h3>
  <label class="layer-row">
    <input type="checkbox" id="chk-f" checked>
    <span class="layer-dot" style="background:#4a90d9"></span>Amigo
  </label>
  <label class="layer-row">
    <input type="checkbox" id="chk-i" checked>
    <span class="layer-dot" style="background:#e05252"></span>Hostil
  </label>
  <label class="layer-row">
    <input type="checkbox" id="chk-n" checked>
    <span class="layer-dot" style="background:#4caf50"></span>Neutro
  </label>
  <label class="layer-row">
    <input type="checkbox" id="chk-d" checked>
    <span class="layer-dot" style="background:#f5c842"></span>Desconhecido
  </label>
</div>

<div id="footer">
  Atualização automática a cada 2 minutos &nbsp;|&nbsp;
  Simbologia APP-6D / MD33-C-01 via milsymbol.js
</div>

<script>
// ── Inicializa o mapa ─────────────────────────────────────────────────────
const map = L.map('map', { center: [-22, -47], zoom: 10 });

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap',
  maxZoom: 19,
}).addTo(map);

// ── Tabelas de conversão (espelham cop_tatico_v7.py) ─────────────────────
const HOSTILIDADE = {
  AMIGO:'03', PRESUMIDO:'02', HOSTIL:'06', SUSPEITO:'05',
  NEUTRO:'04', DESCONHECIDO:'01',
};
const DIMENSAO = {
  UNIDADE:'10', EQUIPAMENTO:'15', INSTALACAO:'20',
  AEREO:'05', INDIVIDUO:'27',
};
const SITUACAO = {
  CONFIRMADA:'0', ESTIMADA:'1', PLANEJADA:'1', SUSPEITA:'1',
};
const ESCALAO = {
  NONE:'00', SQD:'11', SEC:'12', PEL:'13',
  CIA:'14', BIA:'14', ESC:'14', BN:'15',
  GRU:'16', BDA:'17', DIV:'18', CRP:'19', EX:'20', '':'00',
};
const HQTF = {
  '':'0', 'Nenhum':'0', 'Simulacro / Feint':'1',
  'HQ / Posto de Comando':'2', 'HQ + Simulacro':'3',
  'Força-Tarefa':'4', 'Força-Tarefa + Simulacro':'5',
  'Força-Tarefa + HQ':'6', 'Força-Tarefa + HQ + Simul':'7',
};

// Usa o sidc do GeoJSON se disponível, senão monta a partir dos campos
function getSIDC(props) {
  if (props.sidc && props.sidc.length === 20) return props.sidc;

  const h  = HOSTILIDADE[(props.hostilidade||'').toUpperCase()] || '01';
  const d  = DIMENSAO[(props.dimensao||'').toUpperCase()] || '10';
  const s  = SITUACAO[(props.situacao||'').toUpperCase()] || '0';
  const hq = HQTF[props.hqtf||''] || '0';
  const e  = ESCALAO[(props.escalao||'').toUpperCase()] || '00';
  // entity code dos primeiros 6 dígitos do natureza
  const nat = (props.natureza_code || '000000').padEnd(10,'0');
  return `10${h}${d}${s}${hq}${e}${nat}`;
}

// ── Geração do ícone via milsymbol.js ────────────────────────────────────
function criarIconeMilsymbol(feature) {
  const props = feature.properties;
  const sidc  = getSIDC(props);

  const sym = new ms.Symbol(sidc, {
    size:               32,
    uniqueDesignation:  props.designacao   || '',
    higherFormation:    props.escalao_sup  || '',
  });

  const svg    = sym.asSVG();
  const anchor = sym.getAnchor();
  const size   = sym.getSize();

  return L.divIcon({
    html:       svg,
    className:  '',
    iconSize:   [size.width,  size.height],
    iconAnchor: [anchor.x,    anchor.y],
    popupAnchor:[0, -anchor.y],
  });
}

// ── Grupos de camadas ────────────────────────────────────────────────────
const GRUPOS = {
  F: L.layerGroup().addTo(map),  // Amigo + Presumido
  I: L.layerGroup().addTo(map),  // Hostil + Suspeito
  N: L.layerGroup().addTo(map),  // Neutro
  D: L.layerGroup().addTo(map),  // Desconhecido
};

function grupoDeHostilidade(host) {
  const h = (host||'').toUpperCase();
  if (['AMIGO','PRESUMIDO'].includes(h))  return 'F';
  if (['HOSTIL','SUSPEITO'].includes(h))  return 'I';
  if (h === 'NEUTRO')                     return 'N';
  return 'D';
}

// Checkboxes
['f','i','n','d'].forEach(k => {
  document.getElementById(`chk-${k}`).addEventListener('change', e => {
    if (e.target.checked) map.addLayer(GRUPOS[k.toUpperCase()]);
    else                  map.removeLayer(GRUPOS[k.toUpperCase()]);
  });
});

// ── Popup ────────────────────────────────────────────────────────────────
const BADGE = {
  AMIGO:   'color:#1a5296;background:#c8dcff',
  HOSTIL:  'color:#c0392b;background:#ffd0d0',
  NEUTRO:  'color:#27ae60;background:#d0f0d0',
  DESCONHECIDO: 'color:#d4a017;background:#fff3c0',
};

function criarPopup(props) {
  const host  = (props.hostilidade||'DESCONHECIDO').toUpperCase();
  const estilo = BADGE[host] || BADGE.DESCONHECIDO;
  const badge  = `<span class="badge-host" style="${estilo}">${props.hostilidade||'—'}</span>`;

  const campos = [
    ['Hostilidade', badge],
    ['Natureza',    props.natureza],
    ['Escalão',     props.escalao],
    ['Esc. Superior', props.escalao_sup],
    ['Situação',    props.situacao],
    ['HQ/TF',       props.hqtf],
    ['Mobilidade',  props.mobilidade],
    ['Cond. Op.',   props.cond_operac],
    ['Fonte',       props.fonte],
    ['Timestamp',   props.timestamp_edicao],
    ['Obs',         props.obs],
  ].filter(([,v]) => v && String(v).trim() !== '');

  return `
    <div class="popup-content">
      <div class="popup-title">${props.id||'—'} &nbsp;·&nbsp; ${props.designacao||'—'}</div>
      ${campos.map(([l,v]) =>
        `<div class="popup-row">
          <span class="popup-label">${l}</span>
          <span class="popup-value">${v}</span>
        </div>`
      ).join('')}
    </div>`;
}

// ── Carrega GeoJSON ──────────────────────────────────────────────────────
let primeiraVez = true;
const GEOJSON_URL =
  'https://raw.githubusercontent.com/joaopaulo1008/cop-tatico/main/cop_tatico.geojson';

function contadores(features) {
  const c = {F:0, I:0, N:0, D:0};
  features.forEach(f => c[grupoDeHostilidade(f.properties.hostilidade)]++);
  document.getElementById('cnt-f').textContent = `F: ${c.F}`;
  document.getElementById('cnt-i').textContent = `I: ${c.I}`;
  document.getElementById('cnt-n').textContent = `N: ${c.N}`;
  document.getElementById('cnt-d').textContent = `D: ${c.D}`;
}

function carregarDados() {
  fetch(`${GEOJSON_URL}?t=${Date.now()}`)
    .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
    .then(geojson => {
      Object.values(GRUPOS).forEach(g => g.clearLayers());

      const features = geojson.features || [];
      contadores(features);

      features.forEach(feature => {
        const props   = feature.properties;
        const chave   = grupoDeHostilidade(props.hostilidade);
        const marcador = L.marker(
          [feature.geometry.coordinates[1], feature.geometry.coordinates[0]],
          { icon: criarIconeMilsymbol(feature) }
        ).bindPopup(criarPopup(props), { maxWidth: 300 });
        GRUPOS[chave].addLayer(marcador);
      });

      if (primeiraVez && features.length > 0) {
        const coords = features.map(f => [
          f.geometry.coordinates[1],
          f.geometry.coordinates[0],
        ]);
        map.fitBounds(coords, { padding: [50, 50] });
        primeiraVez = false;
      }

      const agora = new Date().toLocaleTimeString('pt-BR');
      document.getElementById('last-update').innerHTML =
        `<span id="update-dot"></span>Atualizado: ${agora} · ${features.length} elementos`;
    })
    .catch(err => {
      document.getElementById('last-update').innerHTML =
        `<span id="update-dot" style="background:#e05252"></span>Erro: ${err.message}`;
    });
}

carregarDados();
setInterval(carregarDados, 120_000);
</script>
</body>
</html>
